<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta</title>
    <link rel="stylesheet" href="./criar.css">
    
</head>
<body>
    <main class="main">
        <h1>Criar conta</h1>
        <form id="dados">
            <div class="criar">
                <input id="nome" name="nome" placeholder="Digite seu nome...">
            </div>
            <div class="criar">
                <input type="email" id="email" name="email" placeholder="Digite seu email...">
            </div>
            <div class="criar">
                <input  id="cpf" name="cpf" placeholder="Digite seu cpf...">
            </div>
            <div class="criar">
                <input type="password" id="senha" name="senha" placeholder="Digite a senha...">
            </div>
            <div>
                <button type="submit" class="entrar">Criar conta</button>
            </div>
            <p id="msg"></p>
        </form>
        <p>Ja tenho uma conta</p>
        <div class="login">
            <p><a href="./index.html">login</a></p>

        </div>
    </main>
    <script src="criar.js"></script>
</body>
</html>
